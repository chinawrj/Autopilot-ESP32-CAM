<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autopilot ESP32-CAM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#eee;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{margin:10px 0 4px;font-size:1.2em;color:#0ff;letter-spacing:2px}
.tabs{display:flex;gap:2px;margin:6px 0}
.tab{padding:6px 16px;font-size:13px;border:1px solid #444;border-radius:4px 4px 0 0;background:#222;color:#888;cursor:pointer;font-family:inherit}
.tab.active{background:#1a1a2e;color:#0ff;border-bottom-color:#1a1a2e}
.stream-box{position:relative;display:inline-block;border:2px solid #0ff;border-radius:0 0 4px 4px;overflow:hidden;background:#000}
#tcp-view{display:block;max-width:90vw;max-height:65vh;background:#000}
#ws-canvas{display:block;max-width:90vw;max-height:65vh;background:#000}
.hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:5px 10px;background:rgba(0,0,0,.65);font-size:13px;color:#0f0;pointer-events:none}
.hud span{margin:0 6px}
.controls{margin:8px 0;display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
.btn{padding:7px 16px;font-size:13px;border:2px solid #555;border-radius:4px;background:#333;color:#eee;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:hover{border-color:#0ff}
.btn.on{border-color:#0f0;color:#0f0}
.btn.off{border-color:#f00;color:#f00}
.btn.snap{border-color:#ff0;color:#ff0}
select{padding:7px;font-size:12px;border:2px solid #555;border-radius:4px;background:#333;color:#eee;cursor:pointer;font-family:inherit}
.ws-only{display:none}
.panel{margin:6px 0;padding:10px 14px;border:1px solid #444;border-radius:4px;background:#222;width:90vw;max-width:640px}
.panel summary{cursor:pointer;color:#0ff;font-size:13px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;margin-top:8px;font-size:12px;color:#aaa}
.info-grid .val{color:#0f0;text-align:right}
.ota-row{display:flex;gap:8px;margin-top:8px;align-items:center}
.ota-row input{flex:1;padding:6px 8px;font-size:13px;border:1px solid #555;border-radius:3px;background:#1a1a2e;color:#eee;font-family:inherit}
.ota-btn{padding:6px 14px;font-size:13px;border:1px solid #f80;border-radius:3px;background:#333;color:#f80;cursor:pointer}
.ota-btn:disabled{opacity:.4;cursor:not-allowed}
.ota-progress{width:100%;height:5px;background:#333;border-radius:3px;margin-top:6px;overflow:hidden}
.ota-progress div{height:100%;width:0%;background:#0f0;transition:width .3s}
.ota-status{font-size:11px;color:#888;margin-top:3px}
.status-bar{font-size:11px;color:#666;margin:6px 0 10px}
.cam-grid{display:flex;flex-direction:column;gap:6px;margin-top:8px;font-size:12px;color:#aaa}
.cam-grid label{display:flex;align-items:center;gap:6px}
.cam-grid input[type=range]{flex:1;accent-color:#0ff}
.cam-grid span{min-width:20px;color:#0f0;text-align:right}
</style>
</head>
<body>
<h1>AUTOPILOT ESP32-CAM</h1>
<div class="tabs">
    <div class="tab active" onclick="switchMode('tcp')">TCP Stream</div>
    <div class="tab" onclick="switchMode('ws')">WS Stream</div>
</div>
<div class="stream-box">
    <img id="tcp-view" src="" alt="MJPEG">
    <canvas id="ws-canvas" width="640" height="480" style="display:none"></canvas>
    <div class="hud">
        <span id="hud-fps">FPS: --</span>
        <span id="hud-temp">TEMP: --&deg;C</span>
        <span id="hud-ws" style="display:none">WS: --</span>
    </div>
</div>
<div class="controls">
    <button id="led-btn" class="btn off" onclick="toggleLed()">&#x1F534; LED OFF</button>
    <button class="btn snap" onclick="takeSnapshot()">&#x1F4F7; Snapshot</button>
    <select class="ws-only" id="sel-q" onchange="wsSend({action:'set_quality',value:parseInt(this.value)})">
        <option value="10">Q:10 Best</option><option value="12" selected>Q:12</option>
        <option value="20">Q:20</option><option value="30">Q:30</option><option value="50">Q:50 Fast</option>
    </select>
    <select class="ws-only" id="sel-res" onchange="wsSend({action:'set_resolution',value:this.value})">
        <option value="QVGA">QVGA</option><option value="VGA" selected>VGA</option>
        <option value="SVGA">SVGA</option><option value="XGA">XGA</option>
    </select>
</div>

<details class="panel" open>
    <summary>&#x1F4CA; System Info <span id="fw-ver" style="color:#888;font-size:11px"></span></summary>
    <div class="info-grid">
        <span>Uptime</span><span class="val" id="si-uptime">--</span>
        <span>Heap Free</span><span class="val" id="si-heap">--</span>
        <span>Heap Min</span><span class="val" id="si-hmin">--</span>
        <span>WiFi RSSI</span><span class="val" id="si-rssi">--</span>
        <span>WiFi Status</span><span class="val" id="si-wifi">--</span>
        <span>Temperature</span><span class="val" id="si-temp">--</span>
    </div>
</details>

<details class="panel">
    <summary>&#x1F4F7; Camera Settings</summary>
    <div class="cam-grid">
        <label>Brightness<input type="range" id="cam-brightness" min="-2" max="2" value="0" oninput="setCam('brightness',this.value)"><span id="v-brightness">0</span></label>
        <label>Contrast<input type="range" id="cam-contrast" min="-2" max="2" value="0" oninput="setCam('contrast',this.value)"><span id="v-contrast">0</span></label>
        <label>Saturation<input type="range" id="cam-saturation" min="-2" max="2" value="0" oninput="setCam('saturation',this.value)"><span id="v-saturation">0</span></label>
        <label>Sharpness<input type="range" id="cam-sharpness" min="-2" max="2" value="0" oninput="setCam('sharpness',this.value)"><span id="v-sharpness">0</span></label>
        <div style="display:flex;gap:12px;margin-top:4px">
            <label style="display:flex;gap:4px;align-items:center"><input type="checkbox" id="cam-hmirror" onchange="setCam('hmirror',this.checked)">H-Mirror</label>
            <label style="display:flex;gap:4px;align-items:center"><input type="checkbox" id="cam-vflip" onchange="setCam('vflip',this.checked)">V-Flip</label>
        </div>
    </div>
</details>

<details class="panel">
    <summary>&#x2699; OTA Firmware Update</summary>
    <div class="ota-row">
        <input id="ota-url" type="text" placeholder="http://server/firmware.bin">
        <button id="ota-btn" class="ota-btn" onclick="startOta()">Update</button>
    </div>
    <div class="ota-progress"><div id="ota-bar"></div></div>
    <div class="ota-status" id="ota-status">Ready</div>
</details>
<details class="panel">
    <summary>&#x1F4BE; SD Card Storage <span id="sd-badge" style="color:#888;font-size:11px"></span></summary>
    <div id="sd-no-card" style="color:#f55;font-size:12px;margin-top:8px;display:none">No SD card detected</div>
    <div id="sd-content" style="display:none">
        <div class="info-grid" style="margin-bottom:8px">
            <span>Card</span><span class="val" id="sd-name">--</span>
            <span>Total</span><span class="val" id="sd-total">--</span>
            <span>Free</span><span class="val" id="sd-free">--</span>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:8px">
            <button class="btn snap" onclick="sdCapture()" id="sd-cap-btn">&#x1F4F7; Capture to SD</button>
            <button class="btn" onclick="sdRefresh()">&#x1F504; Refresh</button>
        </div>
        <div id="sd-files" style="font-size:12px;color:#aaa;max-height:200px;overflow-y:auto"></div>
    </div>
</details>
<div class="status-bar" id="status">Connecting...</div>

<script>
var mode='tcp', ws=null, ledState=false;
var wsFc=0, wsLastT=Date.now(), wsFps=0;
var canvas=document.getElementById('ws-canvas'), ctx=canvas.getContext('2d');
var streamUrl='http://'+location.hostname+':8081/stream/tcp';
document.getElementById('tcp-view').src=streamUrl;

function switchMode(m) {
    mode = m;
    document.querySelectorAll('.tab').forEach(function(t,i){t.className='tab'+(i===(m==='tcp'?0:1)?' active':'')});
    document.getElementById('tcp-view').style.display = m==='tcp'?'block':'none';
    canvas.style.display = m==='ws'?'block':'none';
    document.getElementById('hud-ws').style.display = m==='ws'?'inline':'none';
    document.querySelectorAll('.ws-only').forEach(function(el){el.style.display=m==='ws'?'inline-block':'none'});
    if (m==='ws' && !ws) connectWs();
    if (m==='tcp' && ws) { ws.close(); ws=null; }
}

function connectWs() {
    ws = new WebSocket('ws://'+location.host+'/ws/stream');
    ws.binaryType = 'arraybuffer';
    ws.onopen = function(){ document.getElementById('hud-ws').textContent='WS: connected'; };
    ws.onmessage = function(e) {
        if (typeof e.data==='string') {
            try { var m=JSON.parse(e.data); if(m.heap_free) document.getElementById('si-heap').textContent=Math.round(m.heap_free/1024)+'KB'; } catch(x){}
            return;
        }
        var blob=new Blob([e.data],{type:'image/jpeg'}), url=URL.createObjectURL(blob), img=new Image();
        img.onload=function(){ if(canvas.width!==img.width||canvas.height!==img.height){canvas.width=img.width;canvas.height=img.height;} ctx.drawImage(img,0,0); URL.revokeObjectURL(url); wsFc++; };
        img.src=url;
    };
    ws.onerror = function(){ document.getElementById('hud-ws').textContent='WS: error'; };
    ws.onclose = function(){ document.getElementById('hud-ws').textContent='WS: disconnected'; ws=null; if(mode==='ws') setTimeout(connectWs,2000); };
}
function wsSend(o){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }

function fmtUptime(s) {
    var d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60);
    return (d>0?d+'d ':'')+(h>0?h+'h ':'')+m+'m';
}

function updateStatus() {
    fetch('/api/status').then(function(r){return r.json()}).then(function(d){
        var fps = mode==='ws' ? wsFps : d.fps;
        document.getElementById('hud-fps').textContent='FPS: '+fps.toFixed(1);
        document.getElementById('hud-temp').innerHTML='TEMP: '+d.temperature.toFixed(1)+'&deg;C';
        ledState=d.led_state;
        var btn=document.getElementById('led-btn');
        btn.className='btn '+(ledState?'on':'off');
        btn.innerHTML=ledState?'&#x1F7E2; LED ON':'&#x1F534; LED OFF';
        document.getElementById('si-uptime').textContent=fmtUptime(d.uptime);
        document.getElementById('si-heap').textContent=Math.round(d.heap_free/1024)+'KB';
        document.getElementById('si-hmin').textContent=Math.round(d.heap_min/1024)+'KB';
        document.getElementById('si-rssi').textContent=d.rssi+'dBm';
        document.getElementById('si-wifi').textContent=d.wifi_connected?'Connected':'Disconnected';
        document.getElementById('si-temp').textContent=d.temperature.toFixed(1)+'\u00B0C';
        if(d.version) document.getElementById('fw-ver').textContent=' v'+d.version;
        document.getElementById('status').textContent='Connected | '+new Date().toLocaleTimeString();
    }).catch(function(){ document.getElementById('status').textContent='Connection lost...'; });
}

function updateWsFps() {
    var now=Date.now(), dt=now-wsLastT;
    if(dt>=1000){ wsFps=wsFc*1000/dt; wsFc=0; wsLastT=now; }
}

function toggleLed() {
    fetch('/api/led',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({state:'toggle'})})
    .then(function(r){return r.json()}).then(function(){updateStatus()}).catch(function(){});
}

function takeSnapshot() {
    fetch('/api/snapshot').then(function(r){return r.blob()}).then(function(b){
        var a=document.createElement('a');
        a.href=URL.createObjectURL(b);
        a.download='esp32cam_'+new Date().toISOString().replace(/[:.]/g,'-')+'.jpg';
        a.click(); URL.revokeObjectURL(a.href);
    }).catch(function(){alert('Snapshot failed');});
}

function startOta() {
    var url=document.getElementById('ota-url').value.trim();
    if(!url){alert('Enter firmware URL');return;}
    if(!confirm('Start OTA update? Device will reboot.'))return;
    document.getElementById('ota-btn').disabled=true;
    fetch('/api/ota',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:url})})
    .then(function(r){return r.json()}).then(function(d){
        if(d.status==='started') pollOta();
        else{document.getElementById('ota-status').textContent='Error: '+(d.error||'unknown');document.getElementById('ota-btn').disabled=false;}
    }).catch(function(){document.getElementById('ota-status').textContent='Request failed';document.getElementById('ota-btn').disabled=false;});
}
function pollOta() {
    fetch('/api/ota/status').then(function(r){return r.json()}).then(function(d){
        document.getElementById('ota-bar').style.width=d.progress+'%';
        document.getElementById('ota-status').textContent=d.status+' ('+d.progress+'%)';
        if(d.in_progress) setTimeout(pollOta,500);
        else document.getElementById('ota-btn').disabled=false;
    }).catch(function(){document.getElementById('ota-status').textContent='Device rebooting...';});
}

setInterval(updateStatus,1000);
setInterval(updateWsFps,500);
updateStatus();

function setCam(key, val) {
    var body = {};
    body[key] = (typeof val === 'boolean' || val === true || val === false) ? val : parseInt(val);
    if (key === 'hmirror' || key === 'vflip') body[key] = !!val;
    var el = document.getElementById('v-'+key);
    if (el) el.textContent = val;
    fetch('/api/camera',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json()}).then(function(d){ loadCamSettings(d); }).catch(function(){});
}
function loadCamSettings(d) {
    ['brightness','contrast','saturation','sharpness'].forEach(function(k){
        var el = document.getElementById('cam-'+k);
        var vl = document.getElementById('v-'+k);
        if (el && d[k] !== undefined) { el.value = d[k]; if(vl) vl.textContent = d[k]; }
    });
    if (d.hmirror !== undefined) document.getElementById('cam-hmirror').checked = d.hmirror;
    if (d.vflip !== undefined) document.getElementById('cam-vflip').checked = d.vflip;
}
fetch('/api/camera').then(function(r){return r.json()}).then(loadCamSettings).catch(function(){});

function fmtBytes(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';if(b<1073741824)return(b/1048576).toFixed(1)+'MB';return(b/1073741824).toFixed(2)+'GB';}

function sdRefresh(){
    fetch('/api/sd/status').then(function(r){return r.json()}).then(function(d){
        if(!d.mounted){document.getElementById('sd-no-card').style.display='block';document.getElementById('sd-content').style.display='none';document.getElementById('sd-badge').textContent='(no card)';return;}
        document.getElementById('sd-no-card').style.display='none';document.getElementById('sd-content').style.display='block';
        document.getElementById('sd-badge').textContent='(mounted)';
        document.getElementById('sd-name').textContent=d.name||'SD';
        document.getElementById('sd-total').textContent=fmtBytes(d.total_bytes);
        document.getElementById('sd-free').textContent=fmtBytes(d.free_bytes);
    }).catch(function(){document.getElementById('sd-badge').textContent='(error)';});
    fetch('/api/sd/list').then(function(r){return r.json()}).then(function(d){
        var c=document.getElementById('sd-files');
        if(!d.files||d.files.length===0){c.innerHTML='<div style="color:#666">No files</div>';return;}
        var h='<table style="width:100%;border-collapse:collapse">';
        h+='<tr style="color:#0ff;border-bottom:1px solid #444"><td>Name</td><td style="text-align:right">Size</td><td></td></tr>';
        d.files.forEach(function(f){
            h+='<tr style="border-bottom:1px solid #333"><td>'+f.name+'</td><td style="text-align:right;color:#0f0">'+fmtBytes(f.size)+'</td>';
            h+='<td style="text-align:right"><a href="/api/sd/file/'+f.name+'" target="_blank" style="color:#0ff;text-decoration:none;margin-right:8px">&#x1F517;</a>';
            h+='<span style="color:#f55;cursor:pointer" onclick="sdDelete(\''+f.name+'\')">&#x1F5D1;</span></td></tr>';
        });
        h+='</table>';c.innerHTML=h;
    }).catch(function(){});
}
function sdCapture(){
    document.getElementById('sd-cap-btn').disabled=true;
    fetch('/api/sd/capture',{method:'POST'}).then(function(r){return r.json()}).then(function(d){
        document.getElementById('sd-cap-btn').disabled=false;
        if(d.filename) sdRefresh(); else alert(d.error||'Capture failed');
    }).catch(function(){document.getElementById('sd-cap-btn').disabled=false;alert('Capture failed');});
}
function sdDelete(name){
    if(!confirm('Delete '+name+'?'))return;
    fetch('/api/sd/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename:name})})
    .then(function(r){return r.json()}).then(function(){sdRefresh();}).catch(function(){});
}
setTimeout(sdRefresh, 2000);
</script>
</body>
</html>
